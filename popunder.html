<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test popunder links</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module">
      import * as Popunder from "./src/popunder.ts";
      Popunder.install();
    </script>
  </head>
  <body>
    <ul>
      <li>
        <a
          href="https://www.google.com"
          target="_blank"
          data-popunder="https://www.bing.com"
        >
          Google
        </a>
      </li>
      <li>
        <a
          href="https://www.amazon.co.uk"
          target="_blank"
          data-popunder="https://www.amazon.com"
          data-refresh-delay="0"
        >
          Amazon
        </a>
      </li>
      <li>
        <a href="https://www.bing.com">Bing</a>
      </li>
    </ul>
  </body>
</html>
